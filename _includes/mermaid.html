<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

  mermaid.initialize({
    startOnLoad: false,
    securityLevel: "strict",
    theme: "default"
  });

  window.addEventListener("load", async () => {
    const blocks = document.querySelectorAll(
      "pre > code.language-mermaid, " +
      "code.language-mermaid, " +
      "div.language-mermaid pre code"
    );

    blocks.forEach((code) => {
      const source = code.textContent;

      const mermaidBlock = document.createElement("pre");
      mermaidBlock.className = "mermaid";
      mermaidBlock.textContent = source;

      const wrapper =
        code.closest(".language-mermaid.highlighter-rouge") ||
        code.closest("pre") ||
        code;

      wrapper.replaceWith(mermaidBlock);
    });

    await mermaid.run({
      querySelector: ".mermaid"
    });
  });
</script>
